# Render blueprint: one web service + autonomous paper-mode cycles.
# Secrets are configured in Render; this file intentionally contains no values.
# Render cron schedules are UTC. The split odds jobs avoid an invalid wrapped
# hour range and together cover 14:00-23:59 plus 00:00-04:59 UTC.

services:
  - type: web
    name: nrfi-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn nrfi.api:app --host 0.0.0.0 --port $PORT
    envVars: &envs
      - key: SNOWFLAKE_ACCOUNT
        sync: false
      - key: SNOWFLAKE_USER
        sync: false
      - key: SNOWFLAKE_PASSWORD
        sync: false
      - key: SNOWFLAKE_DATABASE
        sync: false
      - key: SNOWFLAKE_WAREHOUSE
        sync: false
      - key: SNOWFLAKE_ROLE
        sync: false
      - key: SDIO_API_KEY
        sync: false
      - key: OPTIC_API_KEY
        sync: false
      - key: OPTIC_FI_TOTAL_MARKET_ID
        sync: false
      - key: API_BEARER_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: GH_TOKEN
        sync: false
      - key: GITHUB_REPO
        value: phatcobra/nrfi-predictor

  - type: cron
    name: nrfi-ingest-morning
    runtime: python
    schedule: "30 9 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m nrfi.ingest_sportsdata
    envVars: *envs

  - type: cron
    name: nrfi-predict-daily
    runtime: python
    schedule: "0 10 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m nrfi.predict_daily
    envVars: *envs

  - type: cron
    name: nrfi-refresh-odds-day
    runtime: python
    schedule: "*/10 14-23 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m nrfi.ingest_opticodds
    envVars: *envs

  - type: cron
    name: nrfi-refresh-odds-late
    runtime: python
    schedule: "*/10 0-4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m nrfi.ingest_opticodds
    envVars: *envs

  - type: cron
    name: nrfi-grade-nightly
    runtime: python
    schedule: "5 4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m nrfi.grade_nightly
    envVars: *envs

  - type: cron
    name: nrfi-retrain-weekly
    runtime: python
    schedule: "0 6 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m nrfi.retrain_weekly
    envVars: *envs

  - type: cron
    name: nrfi-audit-monthly
    runtime: python
    schedule: "0 7 1 * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m nrfi.audit_monthly
    envVars: *envs
