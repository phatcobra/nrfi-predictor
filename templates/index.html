<!DOCTYPE html>
<html>
<head>
    <title>NRFI/YRFI Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e8eaed; }
        .header { background: #1a1f2e; padding: 20px; border-bottom: 2px solid #2d3748; }
        .header h1 { font-size: 28px; font-weight: 700; }
        .header p { color: #9ca3af; margin-top: 5px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1a1f2e; padding: 20px; border-radius: 8px; border: 1px solid #2d3748; }
        .stat-card h3 { font-size: 14px; color: #9ca3af; font-weight: 500; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: 700; color: #10b981; }
        .predictions { background: #1a1f2e; border-radius: 8px; border: 1px solid #2d3748; }
        .predictions-header { padding: 20px; border-bottom: 1px solid #2d3748; }
        .predictions-header h2 { font-size: 20px; font-weight: 600; }
        .game-card { padding: 20px; border-bottom: 1px solid #2d3748; transition: background 0.2s; }
        .game-card:hover { background: #1f2937; }
        .game-card:last-child { border-bottom: none; }
        .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .matchup { font-size: 18px; font-weight: 600; }
        .game-time { color: #9ca3af; font-size: 14px; }
        .pitchers { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; margin: 15px 0; }
        .pitcher { font-size: 14px; color: #9ca3af; }
        .vs { color: #6b7280; font-weight: 600; }
        .prediction-row { display: flex; gap: 15px; align-items: center; margin-top: 15px; }
        .pred-badge { padding: 8px 16px; border-radius: 6px; font-weight: 600; font-size: 14px; }
        .pred-badge.nrfi { background: #10b981; color: #000; }
        .pred-badge.yrfi { background: #ef4444; color: #fff; }
        .pred-badge.pass { background: #6b7280; color: #fff; }
        .confidence { font-size: 14px; color: #9ca3af; }
        .prob-bar { flex: 1; height: 8px; background: #2d3748; border-radius: 4px; overflow: hidden; }
        .prob-fill { height: 100%; background: #10b981; transition: width 0.3s; }
        .loading { text-align: center; padding: 60px 20px; color: #9ca3af; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #2d3748; border-top-color: #10b981; border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>NRFI/YRFI Predictor</h1>
            <p>First Inning No Runs Scored (NRFI) vs Yes Runs Scored (YRFI)</p>
        </div>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <h3>Today's Games</h3>
                <div class="value" id="totalGames">-</div>
            </div>
            <div class="stat-card">
                <h3>NRFI Picks</h3>
                <div class="value" id="nrfiPicks">-</div>
            </div>
            <div class="stat-card">
                <h3>YRFI Picks</h3>
                <div class="value" style="color: #ef4444;" id="yrfiPicks">-</div>
            </div>
            <div class="stat-card">
                <h3>Avg Confidence</h3>
                <div class="value" id="avgConf">-</div>
            </div>
        </div>
        
        <div class="predictions">
            <div class="predictions-header">
                <h2 id="dateHeader">Loading...</h2>
            </div>
            <div id="gamesList"></div>
        </div>
    </div>
    
    <script>
        function fetchPredictions() {
            document.getElementById('gamesList').innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:20px;">Loading predictions...</p></div>';
            
            fetch('/api/predictions/today')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('dateHeader').textContent = `Predictions for ${data.date}`;
                    document.getElementById('totalGames').textContent = data.count;
                    
                    const nrfi = data.predictions.filter(p => p.prediction === 'NRFI').length;
                    const yrfi = data.predictions.filter(p => p.prediction === 'YRFI').length;
                    const avgConf = data.predictions.reduce((sum, p) => sum + p.confidence, 0) / data.count;
                    
                    document.getElementById('nrfiPicks').textContent = nrfi;
                    document.getElementById('yrfiPicks').textContent = yrfi;
                    document.getElementById('avgConf').textContent = (avgConf * 100).toFixed(0) + '%';
                    
                    const gamesHTML = data.predictions.map(game => `
                        <div class="game-card">
                            <div class="game-header">
                                <div class="matchup">${game.away_team} @ ${game.home_team}</div>
                                <div class="game-time">${game.game_time}</div>
                            </div>
                            <div class="pitchers">
                                <div class="pitcher">${game.away_pitcher}</div>
                                <div class="vs">VS</div>
                                <div class="pitcher" style="text-align: right;">${game.home_pitcher}</div>
                            </div>
                            <div class="prediction-row">
                                <div class="pred-badge ${game.prediction.toLowerCase()}">${game.prediction}</div>
                                <div class="confidence">${(game.confidence * 100).toFixed(0)}% confident</div>
                                <div class="prob-bar">
                                    <div class="prob-fill" style="width: ${game.nrfi_probability * 100}%"></div>
                                </div>
                                <div class="confidence">NRFI: ${(game.nrfi_probability * 100).toFixed(0)}%</div>
                            </div>
                        </div>
                    `).join('');
                    
                    document.getElementById('gamesList').innerHTML = gamesHTML || '<div class="loading"><p>No games scheduled today</p></div>';
                })
                .catch(err => {
                    document.getElementById('gamesList').innerHTML = '<div class="loading"><p style="color: #ef4444;">Error loading predictions</p></div>';
                });
        }
        
        fetchPredictions();
        setInterval(fetchPredictions, 60000); // Refresh every minute
    </script>
</body>
</html>
