name: Daily predictions

# Every morning (11:00 UTC ≈ 07:00 ET), before any MLB game starts:
#   1. refresh the current season's results (incremental ingest)
#   2. fetch today's slate + probable pitchers + forecast weather
#   3. emit calibrated P(YRFI)/P(NRFI) per game
#   4. commit predictions/<date>.csv and predictions/latest.md
#
# Games without an announced probable pitcher get an explicit
# no-prediction note — never an inferred pitcher.

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Slate date YYYY-MM-DD (default: today US/Eastern)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: predict-${{ github.ref }}
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-model.txt

      - name: Install dependencies
        run: pip install -r requirements-model.txt

      - name: Verify a trained model exists
        run: |
          if [ ! -f models/nrfi_model.joblib ]; then
            echo "No trained model committed. Run the 'Train model' workflow first." >&2
            exit 1
          fi

      - name: Refresh current-season data
        run: python -m nrfi.cli ingest --start-season "$(date +%Y)"

      - name: Predict today's slate
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m nrfi.cli predict --date "${{ github.event.inputs.date }}" --weather
          else
            python -m nrfi.cli predict --weather
          fi

      - name: Commit predictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add predictions data/processed
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "Daily predictions [skip ci]"
          BRANCH="${GITHUB_REF#refs/heads/}"
          for delay in 0 2 4 8 16; do
            sleep "$delay"
            git pull --rebase origin "$BRANCH" || true
            if git push origin "HEAD:$BRANCH"; then
              exit 0
            fi
          done
          echo "Failed to push after retries" >&2
          exit 1

      - name: Publish slate to run summary
        run: cat predictions/latest.md >> "$GITHUB_STEP_SUMMARY"
