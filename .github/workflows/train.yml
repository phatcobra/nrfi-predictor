name: Train model

# The autonomous retrain loop:
#   - weekly full retrain on main (all seasons, weather on)
#   - on-demand via workflow_dispatch
#   - verification run on claude/** branches whenever pipeline code changes
#     (quick mode: recent seasons only, so the run finishes fast)
#
# The run ingests real MLB StatsAPI history, walk-forward backtests,
# fits + calibrates the final model, and commits data, model, and reports
# back to the branch that triggered it.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      start_season:
        description: "First season to ingest"
        required: false
        default: ""
  push:
    branches: ["claude/**"]
    paths:
      - "src/nrfi/**"
      - ".github/workflows/train.yml"

permissions:
  contents: write

concurrency:
  group: train-${{ github.ref }}
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-model.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-model.txt
          pip install -e .

      - name: Resolve season window
        id: window
        run: |
          if [ -n "${{ github.event.inputs.start_season }}" ]; then
            START="${{ github.event.inputs.start_season }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            START=2011   # full history
          else
            START=2018   # quick verification window for feature branches
          fi
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "Season window starts at $START"

      - name: Ingest history (MLB StatsAPI + Open-Meteo archive)
        run: python -m nrfi.cli ingest --start-season "${{ steps.window.outputs.start }}" --weather

      - name: Train + walk-forward backtest
        env:
          NRFI_START_SEASON: ${{ steps.window.outputs.start }}
        run: python -m nrfi.cli train

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrfi-model-and-reports
          path: |
            models/
            reports/
          retention-days: 30

      - name: Commit data, model, and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed models reports
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "Retrain: refresh data, model, and backtest reports [skip ci]"
          BRANCH="${GITHUB_REF#refs/heads/}"
          for delay in 0 2 4 8 16; do
            sleep "$delay"
            git pull --rebase origin "$BRANCH" || true
            if git push origin "HEAD:$BRANCH"; then
              exit 0
            fi
          done
          echo "Failed to push after retries" >&2
          exit 1

      - name: Print backtest summary
        run: |
          echo "## Backtest summary" >> "$GITHUB_STEP_SUMMARY"
          cat reports/backtest.md >> "$GITHUB_STEP_SUMMARY"
