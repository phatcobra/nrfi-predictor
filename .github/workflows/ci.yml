name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "src/nrfi/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-model.txt"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-model.txt

      - name: Install dependencies
        run: pip install -r requirements-model.txt

      - name: Lint
        run: python -m ruff check src/nrfi tests

      - name: Tests (fixtures only — no live APIs)
        run: python -m pytest tests/ -q
