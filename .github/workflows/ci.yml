name: ci

on:
  workflow_dispatch:
  push:
    branches: [main, "phase*"]
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install declared dependencies
        run: pip install --disable-pip-version-check -q -r requirements.txt
      - name: Import smoke gate
        run: |
          python - <<'PY'
          import nrfi.api
          import nrfi.build_features
          import nrfi.ensemble
          import nrfi.grade_nightly
          import nrfi.model_registry
          import nrfi.predict_daily
          import nrfi.train
          print("core imports passed")
          PY
      - name: Byte-compile package
        run: python -m py_compile nrfi/*.py scripts/*.py
      - name: Run complete offline release gate
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/ -q 2>&1 | tee pytest.log
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostics-${{ github.sha }}
          path: pytest.log
          if-no-files-found: error
          retention-days: 14
