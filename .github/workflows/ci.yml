name: ci
on:
  push:
    branches: [main, "phase*"]
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install declared dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Byte-compile package
        run: python -m py_compile nrfi/*.py scripts/*.py
      - name: Full offline test suite
        run: pytest tests/ -q
