name: ci
on:
  push:
    branches: [main, "phase*"]
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Byte-compile package
        run: python -m py_compile nrfi/*.py scripts/*.py
      - name: Fabrication + import integrity gates
        run: |
          pip install pytest
          pytest tests/ -q
